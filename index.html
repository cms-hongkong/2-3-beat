<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音符分句大師 - 樂譜練習版</title>
    <style>
        :root {
            --sky-blue: #f0faff;
            --bar-line: #333;
            --rainbow: linear-gradient(to right, #ff4081, #ffeb3b, #4caf50, #00bcd4, #9c27b0);
        }

        body {
            margin: 0;
            background-color: var(--sky-blue);
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 題目資訊 */
        #task-info {
            background: white;
            padding: 20px 40px;
            margin: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            border: 3px solid #b3e5fc;
        }

        .task-msg { font-size: 1.4rem; color: #0277bd; }
        .highlight { color: #e91e63; font-size: 2rem; font-weight: bold; }

        /* 樂譜流水線 */
        #music-line {
            display: flex;
            align-items: center;
            width: 95vw;
            max-width: 1000px;
            margin-top: 80px;
            padding: 20px 0;
            position: relative;
        }

        .measure {
            flex: 1;
            height: 100px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid var(--bar-line); /* 單小節線 */
            cursor: pointer;
        }

        /* 開頭與結尾的特殊處理 */
        .measure:first-child { border-left: 2px solid var(--bar-line); }
        .measure:last-child { border-right: 6px double var(--bar-line); } /* 結尾雙小節線 */

        /* 音符樣式 */
        .notes {
            font-size: 45px;
            letter-spacing: 4px;
            color: #333;
        }

        /* 彩虹弧線 */
        .phrase-arc {
            position: absolute;
            top: -60px;
            height: 70px;
            border: 5px solid;
            border-image: var(--rainbow) 1;
            border-bottom: none;
            border-radius: 120px 120px 0 0;
            pointer-events: none;
            z-index: 10;
        }

        /* 呼吸小鳥 */
        .breath-bird {
            position: absolute;
            right: -15px;
            top: -45px;
            font-size: 30px;
            z-index: 15;
        }

        /* 控制區 */
        #control-panel { margin-top: 60px; text-align: center; }
        .btn {
            padding: 12px 40px;
            font-size: 1.6rem;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        #check-btn { background: #ffca28; color: #5d4037; box-shadow: 0 5px 0 #ffa000; }
        #next-btn { background: #8bc34a; color: white; display: none; box-shadow: 0 5px 0 #689f38; }
        #feedback { margin-top: 20px; font-size: 1.3rem; font-weight: bold; min-height: 1.5em; }
    </style>
</head>
<body>

<div id="task-info">
    <div class="task-msg">
        這是 <span id="beat-display" class="highlight">?</span> 拍子的歌<br>
        請每 <span id="rule-display" class="highlight">?</span> 小節畫一條「分句線」🌈
    </div>
</div>

<div id="music-line"></div>

<div id="control-panel">
    <div id="feedback"></div>
    <button id="check-btn" class="btn" onclick="verify()">檢查分句</button>
    <button id="next-btn" class="btn" onclick="setup()">下一題</button>
</div>

<script>
    // 根據教科書設計多樣化音符
    const PATTERNS = {
        2: ['♩♩', '♫♩', '♩♫', '𝅗𝅥'],
        3: ['♩♩♩', '♫♩♩', '♩♫♩', '♩𝅗𝅥', '𝅗𝅥♩']
    };

    let currentBeat = 2;
    let currentRule = 2;
    let selectedPositions = new Set();

    function setup() {
        const line = document.getElementById('music-line');
        line.innerHTML = '';
        selectedPositions.clear();
        document.getElementById('feedback').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('check-btn').style.display = 'inline-block';

        // 隨機題庫
        currentBeat = Math.random() > 0.5 ? 2 : 3;
        currentRule = Math.random() > 0.5 ? 2 : 4;

        document.getElementById('beat-display').innerText = currentBeat;
        document.getElementById('rule-display').innerText = currentRule;

        // 生成 8 小節
        for (let i = 1; i <= 8; i++) {
            const m = document.createElement('div');
            m.className = 'measure';
            
            const pool = PATTERNS[currentBeat];
            const notesText = pool[Math.floor(Math.random() * pool.length)];
            
            m.innerHTML = `<span class="notes">${notesText}</span>`;
            
            // 點擊事件：切換分句線
            m.onclick = () => handlePhrase(i, m);
            line.appendChild(m);
        }
    }

    function handlePhrase(index, element) {
        if (selectedPositions.has(index)) {
            selectedPositions.delete(index);
            const arc = element.querySelector('.phrase-arc');
            const bird = element.querySelector('.breath-bird');
            if (arc) arc.remove();
            if (bird) bird.remove();
        } else {
            selectedPositions.add(index);
            
            // 創建彩虹弧線，寬度跨越設定的小節數量
            const arc = document.createElement('div');
            arc.className = 'phrase-arc';
            arc.style.width = `calc(${currentRule * 100}% + 4px)`;
            arc.style.right = '-2px'; 
            element.appendChild(arc);

            // 創建小鳥標記 (換氣提示)
            const bird = document.createElement('div');
            bird.className = 'breath-bird';
            bird.innerText = '🐦';
            element.appendChild(bird);
        }
    }

    function verify() {
        let answers = [];
        for (let j = currentRule; j <= 8; j += currentRule) answers.push(j);

        const win = selectedPositions.size === answers.length && 
                    answers.every(a => selectedPositions.has(a));

        const fb = document.getElementById('feedback');
        if (win) {
            fb.innerText = "🌟 畫得太棒了！分句完全正確！";
            fb.style.color = "#2e7d32";
            document.getElementById('check-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'inline-block';
        } else {
            fb.innerText = "❌ 弧線位置好像不對，再數數看？";
            fb.style.color = "#d32f2f";
        }
    }

    setup();
</script>
</body>
</html>
