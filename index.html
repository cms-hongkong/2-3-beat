<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小音樂家分句大冒險</title>
    <style>
        :root {
            --sky-blue: #e1f5fe;
            --note-color: #333;
            --rainbow: linear-gradient(to right, #ff5252, #ffeb3b, #4caf50, #2196f3, #9c27b0);
        }

        body {
            margin: 0;
            background-color: var(--sky-blue);
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #task-header {
            background: white;
            padding: 20px 40px;
            margin: 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            border: 4px solid #81d4fa;
        }

        .task-msg { font-size: 1.6rem; color: #0277bd; }
        .highlight { color: #e91e63; font-size: 2.2rem; font-weight: bold; }

        /* 樂曲區域 */
        #music-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 90vw;
            max-width: 950px;
            margin-top: 60px;
        }

        .measure-box {
            height: 120px;
            background: white;
            border: 3px solid #b0bec5;
            border-radius: 15px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .measure-box:hover { background: #f1f8ff; border-color: #4fc3f7; }

        .measure-id {
            position: absolute;
            top: -20px;
            left: 5px;
            font-size: 14px;
            color: #78909c;
        }

        /* 音符顯示 */
        .notes-display {
            font-size: 45px;
            letter-spacing: 5px;
            color: var(--note-color);
            display: flex;
            align-items: center;
        }

        /* 彩虹分句線 (參考課本設計) */
        .rainbow-arc {
            position: absolute;
            top: -65px;
            height: 80px;
            border: 6px solid;
            border-image: var(--rainbow) 1;
            border-bottom: none;
            border-radius: 150px 150px 0 0;
            pointer-events: none;
            z-index: 10;
        }

        /* 換氣小鳥 (參考課本圖片) */
        .bird-icon {
            position: absolute;
            right: -25px;
            top: -45px;
            font-size: 35px;
            z-index: 11;
        }

        #control-area { margin: 40px 0; display: flex; flex-direction: column; align-items: center; }
        .btn {
            padding: 15px 50px;
            font-size: 1.8rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0 #999;
        }
        #check-btn { background: #ffca28; color: #5d4037; box-shadow: 0 6px 0 #ffa000; }
        #next-btn { background: #66bb6a; color: white; box-shadow: 0 6px 0 #388e3c; display: none; }
        #feedback { margin-bottom: 20px; font-size: 1.5rem; font-weight: bold; height: 30px; }
    </style>
</head>
<body>

<div id="task-header">
    <div class="task-msg">
        這首曲子是 <span id="beat-num" class="highlight">?</span> 拍子<br>
        請每 <span id="phrase-rule" class="highlight">?</span> 小節畫一條「分句線」🌈
    </div>
</div>

<div id="music-grid"></div>

<div id="control-area">
    <div id="feedback"></div>
    <button id="check-btn" class="btn" onclick="validate()">完成分句！</button>
    <button id="next-btn" class="btn" onclick="initGame()">下一題</button>
</div>

<script>
    // 節奏庫：提供不同的音符組合
    const RHYTHM_BANK = {
        2: ['♩♩', '♫♩', '♩♫', '𝅗𝅥'], 
        3: ['♩♩♩', '♫♩♩', '♩♫♩', '♩𝅗𝅥']
    };

    let targetBeat = 2;
    let targetPhrase = 2;
    let userSelections = new Set();

    function initGame() {
        const grid = document.getElementById('music-grid');
        grid.innerHTML = '';
        userSelections.clear();
        document.getElementById('feedback').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('check-btn').style.display = 'block';

        // 隨機生成題目
        targetBeat = Math.random() > 0.5 ? 2 : 3;
        targetPhrase = Math.random() > 0.5 ? 2 : 4;

        document.getElementById('beat-num').innerText = targetBeat;
        document.getElementById('phrase-rule').innerText = targetPhrase;

        // 生成 8 小節
        for (let i = 1; i <= 8; i++) {
            const box = document.createElement('div');
            box.className = 'measure-box';
            
            // 隨機選取該拍子下的一個組合
            const rhythm = RHYTHM_BANK[targetBeat][Math.floor(Math.random() * RHYTHM_BANK[targetBeat].length)];
            
            box.innerHTML = `
                <span class="measure-id">${i}</span>
                <div class="notes-display">${rhythm}</div>
            `;
            
            box.onclick = () => togglePhrase(i, box);
            grid.appendChild(box);
        }
    }

    function togglePhrase(num, el) {
        if (userSelections.has(num)) {
            userSelections.delete(num);
            const arc = el.querySelector('.rainbow-arc');
            const bird = el.querySelector('.bird-icon');
            if (arc) arc.remove();
            if (bird) bird.remove();
        } else {
            userSelections.add(num);
            // 畫出彩虹線，寬度跨越設定的小節數量
            const arc = document.createElement('div');
            arc.className = 'rainbow-arc';
            arc.style.width = `calc(${targetPhrase * 100}% + ${(targetPhrase - 1) * 15}px)`;
            arc.style.right = '-3px';
            el.appendChild(arc);

            // 加入呼吸小鳥提示
            const bird = document.createElement('div');
            bird.className = 'bird-icon';
            bird.innerText = '🐦';
            el.appendChild(bird);
        }
    }

    function validate() {
        let correctAnswers = [];
        for (let i = targetPhrase; i <= 8; i += targetPhrase) correctAnswers.push(i);

        const isCorrect = userSelections.size === correctAnswers.length && 
                          correctAnswers.every(v => userSelections.has(v));

        const feedback = document.getElementById('feedback');
        if (isCorrect) {
            feedback.innerText = "🌟 太準確了！你是分句小專家！";
            feedback.style.color = "#2e7d32";
            document.getElementById('check-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        } else {
            feedback.innerText = "❌ 弧線位置不對喔，再數數看音符？";
            feedback.style.color = "#d32f2f";
        }
    }

    initGame();
</script>
</body>
</html>
